# .github/workflows/update-external-activity.yml
name: Update External Activity

on:
  schedule:
    # JST 7:00 daily (UTC 22:00)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-external-activity
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run importer
        run: python tools/import_external_activity.py --write

      - name: Validate content
        run: python tools/validate_content.py

      - name: Commit & Push (only if changed)
        run: |
          if git diff --quiet data/activity/external_updates.json; then
            echo "No changes to external_updates.json. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/activity/external_updates.json
          git commit -m "chore: update external activity data"
          git push
