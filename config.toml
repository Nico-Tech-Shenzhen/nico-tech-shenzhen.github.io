baseURL = "https://takasumasakazu.net/"
title = "ニコ技深セン / Nico-Tech Shenzhen website"
theme = "PaperMod"
publishDir = "public"

# SEO 基本
enableRobotsTXT = true
canonifyURLs = false
buildFuture = false

# Sitemap（Hugo標準）
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Frontmatter（日付の混乱防止）
[frontmatter]
  date = ["date"]
  lastmod = []
  publishDate = []
  expiryDate = []

# メニュー
[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Updates"
    url = "/updates/"
    weight = 3

  [[menu.main]]
    name = "Writing"
    url = "/writing/"
    weight = 4

  [[menu.main]]
    name = "Videos / Podcasts"
    url = "/videos-podcasts/"
    weight = 5

  [[menu.main]]
    name = "Books"
    url = "/books/"
    weight = 6

  [[menu.main]]
    name = "Talks / Research"
    url = "/talks-research/"
    weight = 7

  [[menu.main]]
    name = "Materials"
    url = "/materials/"
    weight = 8

  [[menu.main]]
    name = "English"
    url = "/english/"
    weight = 9

  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 10

# PaperMod SEO設定
[params.analytics.google]
  SiteVerificationTag = "qZ8Cu4n2HHEflyE7J4NOIcXHW3tpZUkV7QvZEjlGEWQ"

[services]
  [services.googleAnalytics]
    ID = "G-E0N88X4QBG"

[params]
  env = "production"
  mainSections = ["teardown", "shenzhen", "fabcross", "archive"]
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowToc = true
  ShowPostCover = true
  disableSpecial1stPost = true
  author = "Masakazu Takasu"
  description = "ニコ技深セン（Nico-Tech Shenzhen）は、深センのハードウェア産業、Makerエコシステム、スタートアップ、分解（Teardown）、ロボティクス、Physical AIを現地視点で記録するアーカイブ。Field archive of Shenzhen hardware startups, maker ecosystem, reverse engineering, chip teardown, robotics and Physical AI by Masakazu Takasu."

[params.assets]
  favicon = "favicon.ico"
  favicon16x16 = "favicon-16x16.png"
  favicon32x32 = "favicon-32x32.png"
  apple_touch_icon = "apple-touch-icon.png"

[params.label]
  icon = "images/ntshenzhen-logo.jpg"
  iconHeight = 30
  text = "ニコ技深セン / Nico-Tech Shenzhen website"

# Cover 表示
[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false

# 検索結果用 summary 長さ
summaryLength = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
